<!-- Carrito / Mochila Side Drawer -->
<div id="cart-drawer" class="fixed inset-y-0 right-0 w-full md:w-[450px] bg-theme-bg z-[1100] transform translate-x-full transition-transform duration-700 ease-[cubic-bezier(0.85,0,0.15,1)] shadow-2xl flex flex-col">
    <!-- Header -->
    <div class="p-8 border-b border-theme-text/5 flex justify-between items-center bg-theme-surface/30">
        <div class="flex items-center gap-4">
            <i data-lucide="shopping-bag" class="w-5 h-5 text-theme-accent"></i>
            <h2 class="uppercase tracking-[0.3em] text-xs font-bold" data-i18n="nav-menu">Tu Mochila</h2>
        </div>
        <button id="close-cart" class="magnetic p-2 hover:bg-theme-text/5 rounded-full transition-colors cursor-trigger">
            <i data-lucide="x" class="w-6 h-6"></i>
        </button>
    </div>

    <!-- Contenido Dinámico -->
    <div class="flex-1 overflow-y-auto px-8 py-4 hide-scrollbar">
        <!-- Estado Vacío -->
        <div id="cart-empty" class="h-full flex flex-col items-center justify-center text-center space-y-8 py-20 hidden">
            <div class="w-24 h-24 bg-theme-surface rounded-full flex items-center justify-center text-theme-text/10">
                <i data-lucide="coffee" class="w-12 h-12"></i>
            </div>
            <div>
                <p class="text-xl font-serif italic mb-4" data-i18n="cart-empty">Tu mochila está vacía</p>
                <a href="coleccion.html" class="uppercase tracking-widest text-[10px] font-bold text-theme-accent border-b border-theme-accent pb-1 cursor-trigger">Ir a la tienda</a>
            </div>
        </div>

        <!-- Lista de Productos -->
        <div id="cart-full" class="">
            <div id="cart-items-container" class="space-y-2 mb-12">
                <!-- Se llena por JS -->
            </div>

            <!-- Formulario de Envío -->
            <div class="pt-12 border-t border-theme-text/10 space-y-8">
                <span class="uppercase tracking-widest text-[10px] font-bold text-theme-accent block">Datos de Envío</span>
                <div class="grid grid-cols-1 gap-6">
                    <div class="space-y-2">
                        <label class="text-[10px] uppercase tracking-widest opacity-40 font-bold">Nombre Completo</label>
                        <input type="text" id="ship-name" class="w-full bg-theme-surface/50 border-b border-theme-text/10 py-3 px-4 outline-none focus:border-theme-accent transition-colors font-light text-sm">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] uppercase tracking-widest opacity-40 font-bold">Dirección de Entrega</label>
                        <input type="text" id="ship-address" class="w-full bg-theme-surface/50 border-b border-theme-text/10 py-3 px-4 outline-none focus:border-theme-accent transition-colors font-light text-sm">
                    </div>
                    <div class="grid grid-cols-2 gap-6">
                        <div class="space-y-2">
                            <label class="text-[10px] uppercase tracking-widest opacity-40 font-bold">Ciudad</label>
                            <input type="text" id="ship-city" value="Medellín" class="w-full bg-theme-surface/50 border-b border-theme-text/10 py-3 px-4 outline-none focus:border-theme-accent transition-colors font-light text-sm">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] uppercase tracking-widest opacity-40 font-bold">Celular</label>
                            <input type="tel" id="ship-phone" class="w-full bg-theme-surface/50 border-b border-theme-text/10 py-3 px-4 outline-none focus:border-theme-accent transition-colors font-light text-sm">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer Checkout -->
    <div id="cart-footer" class="p-8 bg-theme-bg border-t border-theme-text/5 space-y-6">
        <div class="flex justify-between items-end">
            <span class="uppercase tracking-widest text-[10px] font-bold opacity-40">Total Estimado</span>
            <span id="cart-total" class="text-3xl font-serif italic">$0</span>
        </div>
        
        <button id="checkout-btn" class="w-full py-6 bg-theme-text text-theme-bg uppercase tracking-widest font-bold text-xs hover:bg-theme-accent transition-all duration-500 shadow-xl flex items-center justify-center gap-4 cursor-trigger group">
            Finalizar y Pagar <i data-lucide="arrow-right" class="w-4 h-4 group-hover:translate-x-2 transition-transform"></i>
        </button>
        
        <p class="text-[9px] text-center opacity-30 uppercase tracking-widest leading-loose">
            Pagos seguros procesados por <span class="font-bold">Wompi</span>.<br>
            Tiempos de entrega: 1-3 días hábiles.
        </p>
    </div>
</div>

<!-- Wompi Widget Script -->
<script type="text/javascript" src="https://checkout.wompi.co/widget.js"></script>
